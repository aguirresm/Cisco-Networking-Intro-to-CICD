---

# =============================================================================
# Playbook: verify_vlans.yml
# Purpose:  Verify that expected VLANs exist and have the correct names
#           on switches. All failures are collected and reported at the end.
#
# Usage:    ansible-playbook -i inventory/digital-twin/hosts.ini verify_vlans.yml
# =============================================================================

- name: Verify VLANs on devices
  hosts: switches
  gather_facts: false
  vars_files:
    - vars/vlans.yml

  tasks:
    - name: Collect and run 'show vlan brief'
      ansible.utils.cli_parse:
        command: show vlan brief
        parser:
          name: ansible.netcommon.pyats
        set_fact: vlans_parsed
